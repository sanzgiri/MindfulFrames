services:
  - type: web
    name: mindful-frames
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      # Photo storage. Render's free-tier disk is ephemeral, so use an
      # S3-compatible bucket (Cloudflare R2 recommended) in production.
      - key: STORAGE_DRIVER
        value: s3
      - key: S3_BUCKET
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_REGION
        value: auto
